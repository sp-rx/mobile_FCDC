<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Accommodation & Add Calculator</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: auto;
      padding: 5px;
      font-size:12px;
  background:#ededed; 

    }
    button {
      border-radius:6px;
      padding: 5px;
      font-size:11px; 
      margin:0px 5px;
    }
    input {
      width: 60px;
      margin:0 10px;
      border-radius:6px;
      height:20px;
      font-size:11px
    }
    label {
      display: inline-block;
    }
    .result {
      margin-top: 20px;
      font-weight: bold;
    }
    canvas {
      margin-top: 30px;
    }
   .section {
      border:1px dotted grey;
      padding:2px 20px;
      border-radius:10px
    }
  /* Add this */
  button.active {
    background-color: yellow;
  }
  </style>
</head>
<body>
  <h2>Kiara Optometry Accommodation & Add Calculator</h2>



<div class="section">
  <h3>Duochrome  <button onclick="toggleClass('toggleable')">Hide / Show</button>
</h3>

  <div class="toggleable" style="display:none">

<div style="overflow:hidden;">
  <img src="https://raw.githubusercontent.com/kiaraoptometrypx/mobile_test/main/Near.png"
       style="
         width:100%;
         height:390px;          /* set your desired visible height */
         object-fit:cover;
         object-position:center 17%; 
       ">
</div>

</div>
</div>




<div style="height:10px"></div>

  <!-- Step 1 -->
  <div class="section">

  <h3>Step 1, Balance DC: Enter Add & Nearest balanced Length</h3>
  <div>
    <label>Add (D):</label><input type="number" step="0.25" id="add1">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;

    <label>Length (cm):</label><input type="number" step="1" id="np1">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;

    <button onclick="calculateAccommodation()">Calculate</button>
<button onclick="clearLine1()">Clear</button>

  <div style="display:none"  class="result" id="accommodationResult"></div>
<div style="height:10px"></div>

</div>


  <!-- Step 1B -->
  <h3>Step 2, Minimal Point: Enter Add & Nearest before Blur</h3>
  <div>
    <label>Add (D):</label><input type="number" step="0.25" id="add1b">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;

    <label>Length (cm):</label><input type="number" step="1" id="np1b">&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;

    <button onclick="calculateAccommodationB()">Calculate</button>
<button onclick="clearLine2()">Clear</button>
  <div style="display:none" class="result" id="accommodationResultB"></div>
<div style="height:10px"></div>

</div>
  </div>
<div style="height:10px"></div>

  <!-- Step 2 -->
<div class="section">
  <h3>Calculate Needed Add for Length</h3>
  <div>

    <label>Length(cm):</label>
    <input type="number" step="1" id="wd1">
<button onclick="
  calculateAdd('wd1', 'result1', eyeAccommodation);
  calculateAdd('wd1', 'result1b', eyeAccommodationB);
">
Calculate
</button>

<button style="display:none" onclick="calculateAdd('wd1', 'result1', eyeAccommodation)">Balance</button>
<button style="display:none"  onclick="calculateAdd('wd1', 'result1b', eyeAccommodationB)">Minimal</button>
<div style="height:10px"></div>


<div>
    Balance <span id="result1"> ... </span></div>
<div style="height:5px"></div>

<div>
    Minimal <span id="result1b"> ... <span></div>

<div style="height:10px"></div>

</div>

  </div>

</div>


<div style="display:none">

  <div>
    <label>Distance 2 (cm):</label>
    <input type="number" step="0.1" id="wd2">
    <button onclick="calculateAdd('wd2', 'result2', eyeAccommodation)">Line 1</button>
    <button onclick="calculateAdd('wd2', 'result2b', eyeAccommodationB)">Line 2 Add</button>
    <div class="result" id="result2"></div>
    <div class="result" id="result2b"></div>
  </div>

</div>
<div style="height:10px"></div>


<div class="section">

  <!-- Working distance sliders -->
  <h3>Working Distance <button onclick="toggleClass('toggleable2')">Hide / Show</button>
</h3>




  <div class="toggleable2" style="display:none">
<div>
    <label style="width:120px">Min & Max Length:</label>
    <input style="width:120px" type="range" id="leftSlider" min="0" max="70" value="20" step="5">
    <span id="leftValue">20</span>cm
&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;
    <input style="width:120px" type="range" id="rightSlider" min="50" max="150" value="70" step="5">
    <span id="rightValue">70</span>cm
  </div>
<div style="height:10px"></div>


  <canvas id="addGraph" width="600" height="400"></canvas>

</div>
</div>
<div style="height:100px"></div>

<script>
function toggleClass(className) {
  const elements = document.getElementsByClassName(className);
  for (let el of elements) {
    // toggle between block and none
    el.style.display = (el.style.display === "none") ? "block" : "none";
  }
}
</script>

  <script>
    let eyeAccommodation = null;
    let eyeAccommodationB = null;
    let chart = null;

    const leftSlider = document.getElementById("leftSlider");
    const rightSlider = document.getElementById("rightSlider");
    const leftValue = document.getElementById("leftValue");
    const rightValue = document.getElementById("rightValue");

    leftSlider.addEventListener("input", updateAxis);
    rightSlider.addEventListener("input", updateAxis);

    function updateAxis() {
      let minX = parseFloat(leftSlider.value);
      let maxX = parseFloat(rightSlider.value);

      if (minX < -25) minX = -25;
      if (minX > 70) minX = 70;
      if (maxX < 50) maxX = 50;
      if (maxX > 150) maxX = 150;

      leftValue.textContent = minX;
      rightValue.textContent = maxX;

      if (chart) {
        chart.options.scales.x.min = minX;
        chart.options.scales.x.max = maxX;
        chart.update();
      }
    }

    function calculateAccommodation() {
      const add1 = parseFloat(document.getElementById("add1").value);
      const np1 = parseFloat(document.getElementById("np1").value);

      if (isNaN(add1) || isNaN(np1) || np1 <= 0) {
        alert("Enter a valid add + near point.");
        return;
      }

      eyeAccommodation = 100/np1 - add1;
      const nearPoint = 100/eyeAccommodation;

      document.getElementById("accommodationResult").innerHTML =
        `Eye Accommodation: ${eyeAccommodation.toFixed(2)} D`;

      plotGraph();
    }

    function calculateAccommodationB() {
      const add1b = parseFloat(document.getElementById("add1b").value);
      const np1b = parseFloat(document.getElementById("np1b").value);

      if (isNaN(add1b) || isNaN(np1b) || np1b <= 0) {
        alert("Enter a valid add + near point for line B.");
        return;
      }

      eyeAccommodationB = 100/np1b - add1b;
      const nearPointB = 100/eyeAccommodationB;

      document.getElementById("accommodationResultB").innerHTML =
        `Eye Accommodation B: ${eyeAccommodationB.toFixed(2)} D`;

      plotGraph();
    }

    function calculateAdd(inputId, resultId, accommodation) {


      const wd = parseFloat(document.getElementById(inputId).value);

      let addNeeded = 100/wd - accommodation;
      if (addNeeded<0) addNeeded=0;
      if (addNeeded>4) addNeeded=4;

      document.getElementById(resultId).innerHTML = `Add needed: <b>${addNeeded.toFixed(2)} D</b>`;
    }

    function plotGraph() {
      const datasets = [];

      if (eyeAccommodation !== null) {
        const d1=[], a1=[];
        for (let d=5; d<=160; d++){ let add=100/d-eyeAccommodation; if(add<0) add=0; if(add>5) add=5; d1.push(d); a1.push(add);}
        datasets.push({label:'Balance', data:d1.map((d,i)=>({x:d,y:a1[i]})), borderColor:'grey', fill:false, pointRadius:0});
      }

      if (eyeAccommodationB !== null) {
        const d2=[], a2=[];
        for (let d=5; d<=160; d++){ let add=100/d-eyeAccommodationB; if(add<0) add=0; if(add>5) add=5; d2.push(d); a2.push(add);}
        datasets.push({label:'Minimal', data:d2.map((d,i)=>({x:d,y:a2[i]})), borderColor:'orange', fill:false, pointRadius:0});
      }

      const dotData=[];
      for (let addVal=0.5; addVal<=5; addVal+=0.5){
        if(eyeAccommodation!==null){ let wd=100/(eyeAccommodation+addVal); if(wd>=5 && wd<=70) dotData.push({x:wd,y:addVal}); }
        if(eyeAccommodationB!==null){ let wdB=100/(eyeAccommodationB+addVal); if(wdB>=5 && wdB<=70) dotData.push({x:wdB,y:addVal}); }
      }
      datasets.push({label:'Add', data:dotData, pointBackgroundColor:'red', pointRadius:5, showLine:false});



      const ctx=document.getElementById('addGraph').getContext('2d');
      if(chart) chart.destroy();
      chart=new Chart(ctx,{
        type:'line',
        data:{datasets},
        options:{
          responsive:true,
          interaction:{mode:'nearest', intersect:true},
          plugins:{tooltip:{callbacks:{
            title: c=>`WD: ${c[0].raw.x.toFixed(1)} cm`,
            label: c=>`${c[0].raw.y.toFixed(2)} D`
          }}},
          scales:{
            x:{type:'linear', title:{display:true,text:'Working Distance (cm)'}, min:20, max:70},
            y:{title:{display:true,text:'Add (D)'}, min:0, max:3.5}
          }
        }
      });
    }


function clearLine1() {
  eyeAccommodation = null;
  document.getElementById("accommodationResult").innerHTML = '';
  plotGraph();
}

function clearLine2() {
  eyeAccommodationB = null;
  document.getElementById("accommodationResultB").innerHTML = '';
  plotGraph();
}





  </script>

<script>
  // Map each button to its own relevant inputs
  const buttonInputMap = {
    'calculateAccommodation': ['add1','np1'],
    'calculateAccommodationB': ['add1b','np1b']
  };

  Object.keys(buttonInputMap).forEach(fnName=>{
    const btn = document.querySelector(`button[onclick="${fnName}()"]`);
    const inputs = buttonInputMap[fnName].map(id=>document.getElementById(id));

    if(btn){
      // Highlight on click
      btn.addEventListener('click', ()=>{
        btn.classList.add('active');
        // store original values
        inputs.forEach(input=>{
          input.dataset.original = input.value;
        });
      });

      // Remove highlight if any associated input changes
      inputs.forEach(input=>{
        input.addEventListener('input', ()=>{
          btn.classList.remove('active');
        });
      });
    }
  });
</script>


</body>
</html>
